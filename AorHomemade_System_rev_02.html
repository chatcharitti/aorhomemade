<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Order Management System</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans Thai', 'sans-serif'] },
                    colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' } }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; color: #0f172a; margin: 0; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-container { overflow-x: auto; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); border-radius: 0.5rem; background: white; }
    </style>
</head>
<body>
    <div id="protocol-warning" style="display: none;" class="min-h-screen bg-red-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg border border-red-200">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">ข้อผิดพลาดด้านสภาพแวดล้อม</h1>
            <p class="text-slate-600">กรุณารันไฟล์นี้ผ่าน Web Server (เช่น GitHub Pages หรือ Localhost) ไม่รองรับการเปิดไฟล์ตรง (file:///)</p>
        </div>
    </div>

    <div id="root"></div>

    <script>
        // Basic Protocol Guard
        if (window.location.protocol === 'file:') {
            document.getElementById('protocol-warning').style.display = 'flex';
            document.getElementById('root').style.display = 'none';
        }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // Configuration
        const defaultMockConfig = {
            apiKey: "demo-api-key-bypass-validation",
            authDomain: "demo.firebaseapp.com",
            projectId: "demo-project"
        };

        const app = initializeApp(defaultMockConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Icons Component
        const Icons = {
            Package: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>,
            Users: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            TrendingUp: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            Search: () => <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        };

        function App() {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('orders');

            // Load Mock Data directly for structural integrity
            const loadMockData = () => {
                setOrders([
                    { id: '1', customer: "คุณสมชาย ใจดี", items: "เซ็ตครัวซองต์ 4 ชิ้น", total: 450, status: "completed", timestamp: Date.now() - 100000 },
                    { id: '2', customer: "บริษัท เอบีซี จำกัด", items: "บราวนี่ถาดใหญ่", total: 1200, status: "pending", timestamp: Date.now() },
                    { id: '3', customer: "คุณวิภาวรรณ", items: "เค้กวันเกิด 2 ปอนด์", total: 850, status: "processing", timestamp: Date.now() - 50000 }
                ]);
                setLoading(false);
            };

            useEffect(() => {
                // Initialize system without enforcing real database connection
                loadMockData();
            }, []);

            const filteredOrders = useMemo(() => {
                return orders.filter(order => 
                    order.customer?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    order.items?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [orders, searchTerm]);

            const summaryMetrics = useMemo(() => {
                const totalRevenue = orders.reduce((sum, order) => sum + (Number(order.total) || 0), 0);
                const pendingOrders = orders.filter(o => o.status === 'pending' || o.status === 'processing').length;
                return { totalRevenue, totalOrders: orders.length, pendingOrders };
            }, [orders]);

            const formatCurrency = (num) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(num);

            if (loading) return <div className="flex items-center justify-center min-h-screen"><div className="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-600"></div></div>;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 items-center">
                                <div className="flex items-center gap-2">
                                    <div className="bg-brand-600 p-2 rounded-lg text-white">
                                        <Icons.Package />
                                    </div>
                                    <h1 className="text-xl font-semibold text-slate-800">
                                        Order Management <span className="text-brand-600 font-normal">System</span>
                                    </h1>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <MetricCard title="ยอดขายรวม (Total Revenue)" value={formatCurrency(summaryMetrics.totalRevenue)} icon={<Icons.TrendingUp />} color="brand" />
                            <MetricCard title="คำสั่งซื้อทั้งหมด (Total Orders)" value={summaryMetrics.totalOrders} icon={<Icons.Package />} color="slate" />
                            <MetricCard title="รอดำเนินการ (Pending)" value={summaryMetrics.pendingOrders} icon={<Icons.Users />} color="amber" />
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex space-x-1 bg-slate-100 p-1 rounded-lg w-full sm:w-auto">
                                <button onClick={() => setActiveTab('orders')} className={`flex-1 sm:flex-none px-4 py-2 text-sm font-medium rounded-md transition-colors ${activeTab === 'orders' ? 'bg-white text-brand-700 shadow-sm border border-slate-200/50' : 'text-slate-600 hover:bg-slate-200/50'}`}>รายการคำสั่งซื้อ</button>
                                <button onClick={() => setActiveTab('customers')} className={`flex-1 sm:flex-none px-4 py-2 text-sm font-medium rounded-md transition-colors ${activeTab === 'customers' ? 'bg-white text-brand-700 shadow-sm border border-slate-200/50' : 'text-slate-600 hover:bg-slate-200/50'}`}>ฐานข้อมูลลูกค้า</button>
                            </div>
                            
                            <div className="relative w-full sm:w-72">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icons.Search /></div>
                                <input type="text" className="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg sm:text-sm focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500" placeholder="ค้นหาข้อมูล..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                        </div>

                        {activeTab === 'orders' ? (
                            <div className="table-container">
                                <table className="min-w-full divide-y divide-slate-200">
                                    <thead className="bg-slate-50">
                                        <tr>
                                            <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">วันที่ (Date)</th>
                                            <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">ลูกค้า (Customer)</th>
                                            <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">รายการ (Items)</th>
                                            <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">ยอดรวม (Total)</th>
                                            <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">สถานะ (Status)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white divide-y divide-slate-200">
                                        {filteredOrders.map((order) => (
                                            <tr key={order.id} className="hover:bg-slate-50">
                                                <td className="px-6 py-4 text-sm text-slate-500">{new Date(order.timestamp).toLocaleDateString('th-TH')}</td>
                                                <td className="px-6 py-4 text-sm font-medium text-slate-900">{order.customer}</td>
                                                <td className="px-6 py-4 text-sm text-slate-500">{order.items}</td>
                                                <td className="px-6 py-4 text-sm font-medium text-slate-900">{formatCurrency(order.total)}</td>
                                                <td className="px-6 py-4 text-sm"><StatusBadge status={order.status} /></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 text-center text-slate-500">
                                ส่วนแสดงฐานข้อมูลลูกค้า (อยู่ระหว่างการพัฒนา)
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function MetricCard({ title, value, icon, color }) {
            const colors = { brand: "bg-brand-50 text-brand-600", slate: "bg-slate-100 text-slate-600", amber: "bg-amber-50 text-amber-600" };
            return (
                <div className="bg-white shadow-sm rounded-xl border border-slate-200 p-6 flex items-center">
                    <div className={`p-3 rounded-lg mr-4 ${colors[color]}`}>{icon}</div>
                    <div><p className="text-sm font-medium text-slate-500">{title}</p><p className="mt-1 text-2xl font-semibold text-slate-900">{value}</p></div>
                </div>
            );
        }

        function StatusBadge({ status }) {
            const styles = { completed: "bg-green-50 text-green-700 border-green-200", pending: "bg-amber-50 text-amber-700 border-amber-200", processing: "bg-blue-50 text-blue-700 border-blue-200" };
            const labels = { completed: "เสร็จสิ้น", pending: "รอชำระเงิน", processing: "กำลังจัดเตรียม" };
            return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${styles[status]}`}>{labels[status]}</span>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
